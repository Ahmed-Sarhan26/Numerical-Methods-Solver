<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Numerical Methods Solver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0a0a0a, #ded6d8); min-height: 100vh; }
        .card { border-radius: 15px; }
        h1 { font-weight: bold; }
        .table-responsive { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-center text-white mb-4">Numerical Methods Solver</h1>
    <div class="card p-4 shadow-lg">
        <div class="row">
            <div class="col-md-4">
                <label class="form-label">Method</label>
                <select class="form-select mb-3" id="method">
                    <option value="bisection">Bisection</option>
                    <option value="falsePosition">False Position</option>
                    <option value="fixedPoint">Fixed Point</option>
                    <option value="newton">Newton</option>
                    <option value="secant">Secant</option>
                    <option value="gauss">Gauss Elimination</option>
                    <option value="luDecomposition">LU Decomposition</option>
                    <option value="gaussJordan">Gauss Jordan</option>
                </select>

                <!-- قسم الدالة فقط -->
                <div id="fx-input">
                    <div class="mb-3">
                        <label class="form-label">f(x)</label>
                        <input class="form-control" id="func" placeholder="x^2 - 4">
                    </div>
                </div>

                <!-- هذا القسم يجب أن يكون خارج fx-input لكي لا يختفي -->
                <div id="inputs"></div>

                <!-- قسم الخطأ في الأسفل -->
                <div class="mb-3" id="tol-input">
                    <label class="form-label">ERROR</label>
                    <input class="form-control" id="tol" value="0.001">
                </div>

                <button class="btn btn-primary w-100 mt-3" id="solveBtn">Solve</button>
            </div>
            <div class="col-md-8">
                <h4>Result</h4>
                <div id="result" class="alert alert-success">---</div>
                <div id="table-section">
                    <h5>Iterations</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped table-hover" id="table">
                            <thead class="table-dark" id="table-head"></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="CH1.js"></script>
</body>
</html>
